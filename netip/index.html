<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slike u folderu netip</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f6f6f6; }
    h1 { margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; }
    img { max-width: 120px; max-height: 120px; object-fit: contain; margin-bottom: 8px; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Slike u folderu netip</h1>
  <p>Ukupno slika: 0</p>
  <div class="grid">
    <p>Nema slika u ovom folderu.</p>
  </div>
</body>
</html>
