    .mosaic { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }

    .tile img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s ease; }
    .tile:hover img { transform: scale(1.04); }
